ffb_follow_node:
  ros__parameters:

    # トピック名
    # kobuki用
    auto_cmd_topic: /cmd_vel_auto
    odom_topic: /odom
    manual_active_topic: /handle/manual_active
    emergency_stop_topic: /handle/emergency_stop
    gear_topic: /handle/gear
    steering_norm_topic: /handle/steering_norm
    imu_topic: /sensors/imu_data_raw

    # G923デバイス
    device_path: /dev/input/by-id/usb-Logitech_G923_Racing_Wheel_for_PlayStation_4_and_PC_USYMUGUXEREJOFORUFUMEZIDU-event-joystick

    # Autocenter
    auto_autocenter: 0
    manual_autocenter: 60
    idle_autocenter: 15
    shutdown_autocenter: 80

    # 角度変換
    handle_limit_deg: 450.0
    yaw_to_handle_ratio: 1.25
    invert_yaw_sign: true
    center_offset_deg: -3.0

    # 自律旋回判定
    auto_angular_threshold: 0.05
    auto_cmd_timeout: 0.3

    # 自律旋回中のSpring
    auto_spring_coeff: 15000
    auto_spring_saturation: 22000

    # 手動操作中のSpring
    manual_spring_coeff: 13500
    manual_spring_saturation: 20000

    # 待機中のSpring
    idle_spring_coeff: 13500
    idle_spring_saturation: 20000

    # Spring共通設定
    spring_deadband: 0
    spring_replay_ms: 30000

    # Spring更新
    max_center_step: 150
    coeff_step: 512
    saturation_step: 512

    center_send_threshold: 5
    coeff_send_threshold: 128
    saturation_send_threshold: 128

    effect_refresh_sec: 0.5
    spring_update_period: 0.01

    # Damper
    damper_enabled: false
    damper_coeff: 2500
    damper_saturation: 6000
    damper_deadband: 0

    # 段差振動FFB
    bump_feedback_enabled: true
    bump_angular_threshold: 0.35
    bump_angular_full_scale: 0.55
    bump_min_interval_sec: 0.18
    bump_cooldown_override_rate: 0.60
    bump_min_speed: 0.03
    bump_rumble_enabled: false
    bump_rumble_duration_ms: 120
    bump_rumble_weak_min: 4096
    bump_rumble_weak_max: 17920
    bump_rumble_strong_min: 12288
    bump_rumble_strong_max: 32767
    bump_center_kick_enabled: false
    bump_center_kick_min_deg: 6.0
    bump_center_kick_max_deg: 28.0
    bump_center_kick_duration_sec: 0.24
    bump_center_kick_frequency_hz: 7.0
    bump_center_kick_coeff: 28000
    bump_center_kick_saturation: 32000
    bump_constant_kick_enabled: false
    bump_constant_min_level: 9000
    bump_constant_max_level: 24000
    bump_constant_pulse_ms: 45
    bump_constant_second_delay_sec: 0.055
    bump_periodic_enabled: true
    bump_periodic_preload_enabled: true
    bump_periodic_min_magnitude: 6000
    bump_periodic_max_magnitude: 11000
    bump_periodic_period_ms: 35
    bump_periodic_duration_ms: 120
    bump_periodic_direction: 16384
    bump_angular_z_weight: 0.25
    bump_angular_delta_weight: 0.25
    bump_debug_enabled: true
    bump_debug_period_sec: 1.0

    # 緊急停止通知FFB
    emergency_feedback_enabled: true
    emergency_feedback_magnitude: 5000
    emergency_feedback_period_ms: 35
    emergency_feedback_duration_ms: 120
    emergency_feedback_direction: 16384

    # フェイルセーフ（通信断検出）用FFB設定
    failsafe_timeout_sec: 1.0
    failsafe_active_topic: /failsafe/active
    failsafe_warning_magnitude: 25000
    failsafe_warning_period_ms: 250
    failsafe_warning_duration_ms: 900
    failsafe_lock_autocenter: 85
    failsafe_recovery_magnitude: 15000
    failsafe_recovery_period_ms: 12
    failsafe_recovery_duration_ms: 80

    # カーブ負荷FFB
    corner_load_enabled: true
    corner_load_reference: 0.20
    corner_load_min_speed: 0.10
    corner_load_coeff_gain: 0
    corner_load_saturation_gain: 0
    corner_load_filter_alpha: 0.35


    # カーブ負荷による中心ずらしFFB
    corner_center_shift_enabled: false
    corner_center_shift_max_deg: 45.0
    corner_center_shift_min_rate: 0.10
    corner_center_shift_direction: -1.0


    # カーブ負荷によるAutocenter補正
    # gate方式がONのときは予備機能として残す.
    corner_autocenter_enabled: true
    corner_autocenter_min_rate: 0.10
    corner_autocenter_max: 90
    corner_autocenter_update_threshold: 5

    # 高ギアカーブ時だけAutocenterを強くする.
    corner_gate_autocenter_enabled: true
    corner_gate_min_gear: 4
    corner_gate_min_speed: 0.45
    corner_gate_min_angular: 0.35
    corner_gate_min_steering_norm: 0.20
    corner_gate_min_load_rate: 0.25
    corner_gate_enter_sec: 0.15
    corner_gate_hold_sec: 0.50
    corner_gate_autocenter: 80
